<!DOCTYPE html>
<body lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/style.css">
  <title>product-card</title>
</head>
<body>
  <div class="all-elements">
    <div class="background-picture__img"></div>
    <h1 class="product-card-selection">Выбери свой продукт</h1>
    <div class="button">
      <button class="style-button" id="recolor-first-card-button">Перекрасить фон первой карточки</button>
      <button class="style-button" id="recolor-all-card-button">Перекрасить фон всех карточек</button>
      <button class="style-button" id="open-google-button">Открыть Google</button>
      <button class="style-button" id="recolor-button">Поменять цвет кнопки</button>
    </div>
    <div class="product-card-wrapper">
      <template id="product-card-template">
        <div class="product-card">
          <img class="product-card__img" src="" alt="">
          <p class="product-card__for-skin"></p>
          <h3 class="product-card__title"></h3>
          <p class="product-card__descr"></p>
          <span class="product-card__text">Состав:</span>
          <ul class="product-card__composition"></ul>
          <div class="product-card__price-wrapper">
            <span class="product-card__price-text">Цена</span>
            <span class="product-card__price"></span>
          </div>
        </div>
      </template>
    </div>
  </div>
  <script src="./script.js"></script>
  <script src="./homework-5.js"></script>
  <script src="./homework-6.js"></script>
  <script type="module" src="./homework-7.js"></script>
  <script type="module" src="./homework-8.js"></script>
</body>
</html>
